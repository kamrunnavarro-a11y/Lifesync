<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LifeSync"/>
  <meta name="theme-color" content="#c77dff"/>
  <title>LifeSync ✨</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%;background:#0a0812}
    #loading{position:fixed;inset:0;background:#0a0812;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity 0.5s}
    #loading.hide{opacity:0;pointer-events:none}
    .load-logo{width:72px;height:72px;border-radius:22px;
      background:linear-gradient(135deg,#ff6b9d,#c77dff);
      display:flex;align-items:center;justify-content:center;font-size:36px;
      box-shadow:0 0 40px rgba(199,125,255,0.5);
      animation:pulse 1.8s ease-in-out infinite}
    .load-text{font-family:sans-serif;color:#8b7fa8;font-size:14px;letter-spacing:1px}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    #err{position:fixed;top:20px;left:20px;right:20px;background:rgba(255,77,109,0.15);
      border:1px solid rgba(255,77,109,0.4);color:#ffb3c1;padding:14px;border-radius:12px;
      font:12px/1.5 monospace;z-index:99999;display:none;word-break:break-word;max-height:60vh;overflow:auto;white-space:pre-wrap}
  </style>
</head>
<body>
  <div id="loading">
    <div class="load-logo">🌸</div>
    <div class="load-text">Loading LifeSync…</div>
  </div>
  <div id="err"></div>
  <div id="root"></div>
  <script>
    window.addEventListener('error', function(ev) {
      var el = document.getElementById('err');
      if (el) {
        el.style.display = 'block';
        el.textContent = '⚠ Error: ' + (ev.error && ev.error.message ? ev.error.message : ev.message) +
          '\nFile: ' + (ev.filename || 'unknown') + ':' + ev.lineno + ':' + ev.colno;
      }
    });
  </script>
  <script type="module">
    import React from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
    window.React = React;
    window.createRoot = createRoot;
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    window.useCallback = React.useCallback;
    window.useMemo = React.useMemo;
    window.dispatchEvent(new Event('react-ready'));
  </script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>
</body>
</html>
